<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaVillage Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #0b0b0b;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .panel {
            width: min(760px, 100%);
            background: #c0c0c0;
            color: #111;
            border: 4px solid #fff;
            border-right-color: #4c4c4c;
            border-bottom-color: #4c4c4c;
            box-shadow: 10px 10px 0 rgba(0, 0, 0, 0.35);
            padding: 24px;
            box-sizing: border-box;
        }

        h1 {
            margin: 0 0 20px;
            font-size: 16px;
            color: #0b2adb;
        }

        p {
            font-size: 10px;
            line-height: 1.8;
            margin: 0 0 16px;
        }

        label {
            display: block;
            margin: 14px 0 8px;
            font-size: 10px;
        }

        input {
            width: 100%;
            border: 3px inset #fff;
            background: #fff;
            font-family: 'Press Start 2P', cursive;
            padding: 10px;
            font-size: 10px;
            box-sizing: border-box;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        button {
            font-family: 'Press Start 2P', cursive;
            border: 3px outset #fff;
            background: #6280A9;
            color: #fff;
            padding: 10px 14px;
            font-size: 10px;
            cursor: pointer;
        }

        button:active {
            border-style: inset;
        }

        #status {
            margin-top: 16px;
            font-size: 10px;
            min-height: 14px;
            color: #333;
        }

        .note {
            margin-top: 14px;
            padding: 10px;
            background: #e6e6e6;
            border: 2px solid #b8b8b8;
            font-size: 9px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="panel">
        <h1>MEGAVILLAGE / ADMIN</h1>
        <p>Вставь export URL из Google Apps Script и скачивай CSV со всеми заявками.</p>

        <label for="export-url">EXPORT URL (Apps Script Web App)</label>
        <input id="export-url" type="url" placeholder="https://script.google.com/macros/s/.../exec">

        <label for="admin-key">КЛЮЧ АДМИНА</label>
        <input id="admin-key" type="password" placeholder="admin key">

        <div class="actions">
            <button id="save-config" type="button">СОХРАНИТЬ</button>
            <button id="download-csv" type="button">СКАЧАТЬ CSV</button>
        </div>

        <div id="status"></div>
        <div class="note">
            Формат запроса: <code>GET exportUrl?key=...&format=csv</code><br>
            Проверку ключа лучше делать внутри Apps Script, а не на фронте.
        </div>
    </div>

    <script>
        const exportUrlInput = document.getElementById('export-url');
        const adminKeyInput = document.getElementById('admin-key');
        const saveButton = document.getElementById('save-config');
        const downloadButton = document.getElementById('download-csv');
        const statusNode = document.getElementById('status');

        const STORAGE_EXPORT_URL = 'mv_admin_export_url';
        const STORAGE_ADMIN_KEY = 'mv_admin_key';

        const savedUrl = localStorage.getItem(STORAGE_EXPORT_URL) || '';
        const savedKey = localStorage.getItem(STORAGE_ADMIN_KEY) || '';
        exportUrlInput.value = savedUrl;
        adminKeyInput.value = savedKey;

        function setStatus(text, isError = false) {
            statusNode.textContent = text;
            statusNode.style.color = isError ? '#8b0000' : '#234f1e';
        }

        saveButton.addEventListener('click', () => {
            const exportUrl = exportUrlInput.value.trim();
            const adminKey = adminKeyInput.value.trim();

            if (!exportUrl) {
                setStatus('Укажи export URL.', true);
                return;
            }

            localStorage.setItem(STORAGE_EXPORT_URL, exportUrl);
            localStorage.setItem(STORAGE_ADMIN_KEY, adminKey);
            setStatus('Сохранено локально в браузере.');
        });

        downloadButton.addEventListener('click', () => {
            const exportUrl = exportUrlInput.value.trim();
            const adminKey = adminKeyInput.value.trim();

            if (!exportUrl) {
                setStatus('Нет export URL.', true);
                return;
            }

            localStorage.setItem(STORAGE_EXPORT_URL, exportUrl);
            localStorage.setItem(STORAGE_ADMIN_KEY, adminKey);

            const url = new URL(exportUrl);
            if (adminKey) url.searchParams.set('key', adminKey);
            url.searchParams.set('format', 'csv');

            window.open(url.toString(), '_blank', 'noopener');
            setStatus('Открыл ссылку на скачивание CSV.');
        });
    </script>
</body>
</html>
